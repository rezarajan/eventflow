profile: eventflow.cloudevents.profile.v1
standard: CloudEvents
purpose: Event envelope for school-domain business events.
specversion: "1.0"
required_attributes:
  - id
  - source
  - specversion
  - type
  - time
  - datacontenttype
  - data
required_datacontenttype: application/json
source_prefix: urn:eventflow:sampledb
extension_attributes:
  - datasettier
  - correlationid
  - causationid
  - runid
  - tenant
compatibility_rules:
  - Event payloads must be versioned using the CloudEvents type attribute.
  - Payload schemas must be JSON Schema documents.
  - CloudEvents is used for domain events, not as a replacement for OpenLineage.
