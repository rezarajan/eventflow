profile: eventflow.iceberg.table.compatibility.v1
standard: Apache Iceberg table format
purpose: Durable lakehouse table contract.
required_capabilities:
  - table_metadata
  - snapshots
  - schema_tracking
  - partition_spec_tracking
  - manifest_files
  - parquet_data_files
  - append_writes
  - snapshot_reads
compatibility_rules:
  - Tables must be addressable by namespace and table name.
  - Table metadata location must be discoverable through the catalog.
  - Writes must produce a new snapshot.
  - Data files must use Parquet unless explicitly changed through an ADR.
excluded_for_increment_1:
  - row-level deletes
  - merge-on-read behavior
  - advanced partition evolution
  - multi-engine concurrent writes
