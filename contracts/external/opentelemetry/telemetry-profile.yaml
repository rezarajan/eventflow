profile: eventflow.opentelemetry.profile.v1
standard: OpenTelemetry
purpose: Vendor-neutral technical observability.
required_signals:
  - traces
  - metrics
  - logs
required_resource_attributes:
  - service.name
  - service.version
  - deployment.environment
  - eventflow.component
required_span_attributes:
  - run.id
  - dataset.name
  - dataset.tier
  - adapter.name
compatibility_rules:
  - Telemetry must not replace lineage or audit records.
  - Correlation IDs should connect telemetry, audit, domain events, and lineage events.
excluded_for_increment_1:
  - collector deployment
  - backend selection
