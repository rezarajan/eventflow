profile: datascape.iceberg.rest.compatibility.v1
standard: Apache Iceberg REST Catalog API
purpose: Catalog boundary for namespaces and Iceberg tables.
required_operations:
  - ListNamespaces
  - CreateNamespace
  - LoadNamespaceMetadata
  - ListTables
  - CreateTable
  - LoadTable
  - RegisterTable
  - DropTable
compatibility_rules:
  - Catalog clients must use the REST catalog boundary, not backend-specific metadata stores.
  - Namespace and table identifiers must be stable across dev and prod.
  - Catalog URI, warehouse location, and credentials must be configured through environment variables.
excluded_for_increment_1:
  - OAuth flows
  - row-level authorization
  - branch/tag operations
  - table transactions beyond basic append and load semantics
