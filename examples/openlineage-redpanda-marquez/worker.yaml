apiVersion: eventflow.dev/v1alpha1
kind: RedpandaReceiver
metadata:
  name: lineage-topic
spec:
  brokers: ["localhost:19092"]
  topic: openlineage.events.v1
  groupId: eventflow-openlineage-worker
  startOffset: first
---
apiVersion: eventflow.dev/v1alpha1
kind: QuarantineStore
metadata:
  name: worker-quarantine
spec:
  path: var/eventflow/worker-quarantine.sqlite
---
apiVersion: eventflow.dev/v1alpha1
kind: HTTPEmitter
metadata:
  name: marquez
spec:
  url: http://localhost:5000/api/v1/lineage
  timeout: 15s
  idempotencyHeader: X-Eventflow-Event-Id
---
apiVersion: eventflow.dev/v1alpha1
kind: OpenLineageContract
metadata:
  name: openlineage-run-event
spec:
  version: v1
  type: io.openlineage.run-event.v1
  allowedSchemaVersions: ["2-0-2"]
---
apiVersion: eventflow.dev/v1alpha1
kind: OpenLineagePolicy
metadata:
  name: governed-lineage
spec:
  version: v1
  allowedSchemaVersions: ["2-0-2"]
  allowedProducers:
    - github.com/rezarajan/eventflow/examples/openlineage
  principalJobNamespaces:
    kafka://eventflow-openlineage-worker:
      - eventflow.example
  principalDatasetNamespaces:
    kafka://eventflow-openlineage-worker:
      - warehouse
  allowedDatasetUriSchemes: ["s3", "file"]
  allowCustomFacets: true
---
apiVersion: eventflow.dev/v1alpha1
kind: EventFlow
metadata:
  name: lineage-worker
spec:
  mode: kafka-to-marquez
  receiverRef:
    kind: RedpandaReceiver
    name: lineage-topic
  contractRef:
    kind: OpenLineageContract
    name: openlineage-run-event
  policyRef:
    kind: OpenLineagePolicy
    name: governed-lineage
  emitterRef:
    kind: HTTPEmitter
    name: marquez
  quarantineRef:
    kind: QuarantineStore
    name: worker-quarantine
