apiVersion: eventflow.dev/v1alpha1
kind: HTTPReceiver
metadata:
  name: lineage-http
spec:
  address: ":18081"
  path: /events
  maxBody: 1048576
  principalHeader: X-Eventflow-Principal
  trustedProxyCidrs: ["*"]
  readTimeout: 5s
  writeTimeout: 30s
  idleTimeout: 60s
---
apiVersion: eventflow.dev/v1alpha1
kind: QuarantineStore
metadata:
  name: quarantine
spec:
  path: var/eventflow/quarantine.sqlite
---
apiVersion: eventflow.dev/v1alpha1
kind: RedpandaEmitter
metadata:
  name: lineage-events
spec:
  brokers: ["localhost:19092"]
  topic: openlineage.events.v1
---
apiVersion: eventflow.dev/v1alpha1
kind: OpenLineageContract
metadata:
  name: openlineage-run-event
spec:
  version: v1
  type: io.openlineage.run-event.v1
  allowedSchemaVersions: ["2-0-2"]
  maxEventBytes: 1048576
---
apiVersion: eventflow.dev/v1alpha1
kind: OpenLineagePolicy
metadata:
  name: governed-lineage
spec:
  version: v1
  allowedSchemaVersions: ["2-0-2"]
  allowedProducers:
    - github.com/rezarajan/eventflow/examples/openlineage
  principalJobNamespaces:
    spiffe://example/dagster:
      - eventflow.example
  principalDatasetNamespaces:
    spiffe://example/dagster:
      - warehouse
  allowedDatasetUriSchemes: ["s3", "file"]
  allowCustomFacets: true
  maxEventBytes: 1048576
---
apiVersion: eventflow.dev/v1alpha1
kind: EventFlow
metadata:
  name: lineage-ingress
spec:
  mode: http-to-kafka
  receiverRef:
    kind: HTTPReceiver
    name: lineage-http
  contractRef:
    kind: OpenLineageContract
    name: openlineage-run-event
  policyRef:
    kind: OpenLineagePolicy
    name: governed-lineage
  emitterRef:
    kind: RedpandaEmitter
    name: lineage-events
  quarantineRef:
    kind: QuarantineStore
    name: quarantine
  brokerUnavailablePolicy: reject
